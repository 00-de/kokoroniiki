<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no
">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffd9ec">

<title>DayDreamプラス Life</title>

<style>

:root{
  --bg1:#fff5fb;
  --bg2:#eef7ff;
  --card:#ffffff;
  --text:#444;
  --accent:#ff7fb0;
  --shadow:0 8px 24px rgba(0,0,0,0.08);
  --fontSize:22px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  sans-serif;
  background:
  linear-gradient(
  180deg,
  var(--bg1),
  var(--bg2)
  );
  color:var(--text);
  min-height:100vh;
  padding:
  env(safe-area-inset-top)
  16px
  calc(100px + env(safe-area-inset-bottom))
  16px;
  font-size:var(--fontSize);
  transition:0.3s;
}

.card{
  background:var(--card);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

.title{
  font-size:1.4em;
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
}

.subText{
  text-align:center;
  color:#777;
  font-size:0.9em;
  margin-top:8px;
  line-height:1.6;
}

.bigDate{
  font-size:1.2em;
  font-weight:bold;
  text-align:center;
  line-height:1.7;
}

.time{
  font-size:2.2em;
  text-align:center;
  font-weight:bold;
  color:var(--accent);
}

.weather{
  text-align:center;
  line-height:1.8;
}

.weatherIcon{
  font-size:2.2em;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin-top:10px;
  font-size:1em;
  background:#ffe1ef;
  color:#444;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.98);
}

.check{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

input[type="checkbox"]{
  width:28px;
  height:28px;
}

.moodGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.moodBtn{
  border:none;
  border-radius:20px;
  padding:18px;
  font-size:1em;
  background:#eef4ff;
  cursor:pointer;
}

.message{
  line-height:1.8;
  font-weight:bold;
  color:#ff6699;
}

.member{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:#fff7fb;
}

.settings{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:white;
  font-size:28px;
  box-shadow:var(--shadow);
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modalContent{
  width:92%;
  max-height:85vh;
  overflow:auto;
  background:white;
  border-radius:28px;
  padding:20px;
}

input,select,textarea{
  width:100%;
  padding:16px;
  margin-top:10px;
  margin-bottom:16px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:1em;
  font-family:inherit;
  background:white;
}

textarea{
  min-height:100px;
  resize:vertical;
}

.fontButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.calendarHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.calendarTitle{
  font-weight:bold;
  text-align:center;
  flex:1;
}

.calendarWeek,
.calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.calendarWeek div{
  text-align:center;
  font-weight:bold;
  color:#888;
  padding:8px 0;
}

.calendarCell{
  background:#fff7fb;
  border-radius:18px;
  min-height:118px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  padding:8px 6px 10px 6px;
  cursor:pointer;
  transition:0.2s;
}

.calendarCell:active{
  transform:scale(0.98);
}

.calendarCell.empty{
  background:transparent;
  box-shadow:none;
  cursor:default;
}

.calendarCell.today{
  background:linear-gradient(180deg,#ff7fb0,#ff96bf);
  color:white;
  font-weight:bold;
}

.calendarCell.hasEvent{
  background:linear-gradient(180deg,#fff0f7,#ffe1ee);
  border:2px solid #ff9dc4;
  box-shadow:0 8px 18px rgba(255,127,176,0.18);
}

.calendarCell.today.hasEvent{
  background:linear-gradient(180deg,#ff5d9a,#ff89b7);
  border:2px solid rgba(255,255,255,0.95);
  box-shadow:0 10px 22px rgba(255,105,155,0.34);
}

.dateNum{
  align-self:flex-end;
  font-weight:bold;
  font-size:0.95em;
}

.eventCount{
  align-self:flex-start;
  margin-top:4px;
  font-size:0.54em;
  line-height:1;
  padding:4px 8px;
  border-radius:999px;
  background:#fff;
  color:#ff6699;
  font-weight:bold;
}

.calendarCell.today .eventCount{
  background:rgba(255,255,255,0.2);
  color:white;
  border:1px solid rgba(255,255,255,0.45);
}

.miniBadgeRow{
  display:flex;
  flex-wrap:wrap;
  gap:4px;
  margin-top:6px;
}

.miniBadge{
  font-size:0.5em;
  line-height:1;
  padding:4px 6px;
  border-radius:999px;
  color:white;
  font-weight:bold;
}

.eventLine{
  font-size:0.56em;
  line-height:1.4;
  margin-top:5px;
  width:100%;
  padding-left:6px;
  border-left:4px solid #ccc;
  color:#555;
  word-break:break-word;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.calendarCell.today .eventLine{
  color:white;
  border-left-color:rgba(255,255,255,0.95);
}

.moreLine{
  font-size:0.54em;
  margin-top:4px;
  color:#777;
  font-weight:bold;
}

.calendarCell.today .moreLine{
  color:white;
}

.cat-hospital{ background:#ff7f9d; }
.cat-shopping{ background:#ffb14a; }
.cat-medicine{ background:#5aa7ff; }
.cat-anniversary{ background:#b07cff; }
.cat-other{ background:#7f96a8; }

.border-hospital{ border-left-color:#ff7f9d; }
.border-shopping{ border-left-color:#ffb14a; }
.border-medicine{ border-left-color:#5aa7ff; }
.border-anniversary{ border-left-color:#b07cff; }
.border-other{ border-left-color:#7f96a8; }

.miniBtn{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  background:#ffe1ef;
  color:#444;
  font-size:1em;
  cursor:pointer;
}

.selectedDateLabel{
  text-align:center;
  font-weight:bold;
  color:#ff6699;
  margin-bottom:10px;
  line-height:1.6;
}

.sectionLabel{
  font-weight:bold;
  margin:12px 0 6px 0;
  color:#666;
}

.scheduleList{
  margin-bottom:16px;
}

.emptySchedule{
  background:#fafafa;
  border-radius:18px;
  padding:14px;
  text-align:center;
  color:#888;
  line-height:1.6;
}

.scheduleItem{
  background:#fff7fb;
  border-radius:18px;
  padding:14px;
  margin-bottom:10px;
  border:2px solid rgba(255,127,176,0.1);
}

.scheduleItemTop{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}

.scheduleMeta{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}

.categoryBadge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  color:white;
  font-size:0.8em;
  font-weight:bold;
}

.timeBadge{
  display:inline-block;
  padding:6px 10px;
  border-radius:999px;
  background:#f1f4f8;
  color:#555;
  font-size:0.8em;
  font-weight:bold;
}

.scheduleText{
  margin-top:10px;
  font-weight:bold;
  line-height:1.6;
}

.scheduleMemo{
  margin-top:8px;
  color:#666;
  line-height:1.6;
  font-size:0.92em;
  white-space:pre-wrap;
}

.readOnlyNote{
  margin-top:8px;
  color:#8a74c9;
  font-size:0.86em;
  line-height:1.6;
}

.deleteSmallBtn{
  border:none;
  background:#ffe4ec;
  color:#a44;
  border-radius:12px;
  padding:8px 12px;
  cursor:pointer;
  font-size:0.82em;
  white-space:nowrap;
}

.footerSpace{
  height:60px;
}

</style>
</head>
<body>

<div class="card">
  <div class="title">🌸 DayDreamプラス Life</div>
  <div class="bigDate" id="date"></div>
  <div class="time" id="time"></div>
</div>

<div class="card weather">
  <div class="weatherIcon" id="weatherIcon">📍</div>
  <div id="weatherText">
    現在地の天気を取得しています...
  </div>
  <button class="btn" onclick="loadWeatherByGPS()">
    現在地の天気を再取得
  </button>
</div>

<div class="card">

  <div class="title">📅 カレンダー</div>

  <div class="calendarHeader">
    <button class="miniBtn" onclick="changeMonth(-1)">←</button>
    <div class="calendarTitle" id="calendarTitle"></div>
    <button class="miniBtn" onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendarWeek">
    <div>日</div>
    <div>月</div>
    <div>火</div>
    <div>水</div>
    <div>木</div>
    <div>金</div>
    <div>土</div>
  </div>

  <div class="calendarGrid" id="calendar"></div>

  <div class="subText">
    日付をタップすると、その日の予定を複数登録できます✨
  </div>

</div>

<div class="card">

  <div class="title">💊 薬チェック</div>

  <label class="check">
    <input type="checkbox" id="morning">
    朝の薬
  </label>

  <label class="check">
    <input type="checkbox" id="noon">
    昼の薬
  </label>

  <label class="check">
    <input type="checkbox" id="night">
    夜の薬
  </label>

</div>

<div class="card">

  <div class="title">😊 今日の気分</div>

  <div class="moodGrid">

    <button class="moodBtn" onclick="setMood('😊 元気')">
      😊 元気
    </button>

    <button class="moodBtn" onclick="setMood('🙂 普通')">
      🙂 普通
    </button>

    <button class="moodBtn" onclick="setMood('😢 疲れた')">
      😢 疲れた
    </button>

    <button class="moodBtn" onclick="setMood('😴 眠い')">
      😴 眠い
    </button>

  </div>

</div>

<div class="card">

  <div class="title">🌈 DayDreamメッセージ</div>

  <div class="member">
    <div class="message" id="messageArea"></div>
  </div>

</div>

<div class="card">

  <div class="title">🎂 記念日</div>

  <div id="anniversaryText">
    記念日を設定してください✨
  </div>

</div>

<button class="settings" onclick="openSettings()">
⚙️
</button>

<div class="modal" id="modal">
  <div class="modalContent">

    <div class="title">⚙️ 設定</div>

    <input type="text" id="name" placeholder="名前">
    <input type="text" id="nickname" placeholder="あだ名">
    <input type="text" id="city" placeholder="住んでいる地域">
    <input type="date" id="birthday">
    <input type="text" id="hobby" placeholder="趣味">

    <input type="text" id="anniversaryName" placeholder="記念日名（例：結婚記念日）">
    <input type="date" id="anniversaryDate">

    <div class="title">🔠文字サイズ</div>

    <div class="fontButtons">
      <button class="btn" onclick="setFont(18)">小</button>
      <button class="btn" onclick="setFont(22)">中</button>
      <button class="btn" onclick="setFont(28)">大</button>
      <button class="btn" onclick="setFont(34)">最大</button>
    </div>

    <button class="btn" onclick="saveSettings()">
      保存
    </button>

    <button class="btn" onclick="closeSettings()">
      閉じる
    </button>

  </div>
</div>

<div class="modal" id="scheduleModal">
  <div class="modalContent">

    <div class="title">🗓️ 予定一覧・追加</div>

    <div class="selectedDateLabel" id="selectedDateLabel"></div>

    <div class="sectionLabel">この日の予定</div>
    <div class="scheduleList" id="scheduleList"></div>

    <div class="sectionLabel">新しい予定を追加</div>

    <select id="scheduleCategory">
      <option value="病院">病院</option>
      <option value="買い物">買い物</option>
      <option value="薬">薬</option>
      <option value="その他">その他</option>
    </select>

    <input type="time" id="scheduleTime">

    <input type="text" id="scheduleTitle" placeholder="予定名（例：内科受診、スーパー、朝の薬）">

    <textarea id="scheduleMemo" placeholder="メモ（任意）"></textarea>

    <button class="btn" onclick="addSchedule()">
      予定を追加
    </button>

    <button class="btn" onclick="closeScheduleModal()">
      閉じる
    </button>

  </div>
</div>

<div class="footerSpace"></div>

<script>

function updateClock(){

  const now = new Date();

  const week = [
    "日","月","火","水","木","金","土"
  ];

  const reiwa = now.getFullYear() - 2018;

  const h = now.getHours();
  const ampm = h >= 12 ? "午後" : "午前";
  const hh = String(h % 12 || 12).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");

  document.getElementById("date").innerHTML =
  `
  令和${reiwa}年
  ${now.getMonth()+1}月
  ${now.getDate()}日
  (${week[now.getDay()]}曜日)
  `;

  document.getElementById("time").innerHTML =
  `${ampm} ${hh}:${mm}`;
}

setInterval(updateClock,1000);
updateClock();

const messages = [
"悠真：今日はゆっくりでも大丈夫☺️",
"結衣：頑張ってるのちゃんと知ってるよ✨",
"蓮：焦らなくて大丈夫！",
"葵：笑顔でいこうね🌸",
"大地：元気出していこう！",
"美琴：あなたは一人じゃないよ🌈"
];

function randomMessage(){
  const msg =
  messages[
    Math.floor(Math.random()*messages.length)
  ];

  document.getElementById("messageArea").innerHTML = msg;
}

randomMessage();

function setMood(mood){
  localStorage.setItem("mood",mood);
  alert("保存しました✨\n" + mood);
  randomMessage();
}

function saveChecks(){
  localStorage.setItem(
    "morning",
    document.getElementById("morning").checked
  );

  localStorage.setItem(
    "noon",
    document.getElementById("noon").checked
  );

  localStorage.setItem(
    "night",
    document.getElementById("night").checked
  );
}

["morning","noon","night"].forEach(id=>{
  document
  .getElementById(id)
  .addEventListener("change",saveChecks);
});

function loadChecks(){
  ["morning","noon","night"].forEach(id=>{
    document.getElementById(id).checked =
    localStorage.getItem(id)==="true";
  });
}

loadChecks();

function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function refreshAnniversaryText(){

  const name =
    localStorage.getItem("anniversaryName") ||
    localStorage.getItem("anniversary") ||
    "";

  const date = localStorage.getItem("anniversaryDate") || "";

  if(date){
    const parts = date.split("-");
    const month = Number(parts[1]);
    const day = Number(parts[2]);

    document.getElementById("anniversaryText").innerHTML =
      `🎉 ${name || "記念日"}<br>` +
      `毎年 ${month}月${day}日`;
    return;
  }

  if(name){
    document.getElementById("anniversaryText").innerHTML =
      `🎉 ${name}<br>` +
      `<span style="font-size:0.85em;color:#777;">日付を設定するとカレンダーに自動表示されます</span>`;
    return;
  }

  document.getElementById("anniversaryText").innerHTML =
    "記念日を設定してください✨";
}

function saveSettings(){

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversaryName",
    "anniversaryDate"
  ];

  ids.forEach(id=>{
    localStorage.setItem(
      id,
      document.getElementById(id).value
    );
  });

  refreshAnniversaryText();
  renderCalendar();

  alert("保存しました✨");
  closeSettings();
}

function loadSettings(){

  const legacyAnniversary = localStorage.getItem("anniversary") || "";

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversaryName",
    "anniversaryDate"
  ];

  ids.forEach(id=>{
    document.getElementById(id).value =
    localStorage.getItem(id)||"";
  });

  if(
    !document.getElementById("anniversaryName").value &&
    legacyAnniversary
  ){
    document.getElementById("anniversaryName").value =
    legacyAnniversary;
  }

  refreshAnniversaryText();
}

loadSettings();

function setFont(size){
  document.documentElement.style
  .setProperty("--fontSize",size+"px");

  localStorage.setItem("fontSize",size);
}

const savedFont = localStorage.getItem("fontSize");

if(savedFont){
  setFont(savedFont);
}

let calendarDate = new Date(
  new Date().getFullYear(),
  new Date().getMonth(),
  1
);

const scheduleStorageKey = "calendarSchedulesV2";
let selectedDateKey = "";

const categoryMeta = {
  "病院": {
    className:"cat-hospital",
    borderClass:"border-hospital"
  },
  "買い物": {
    className:"cat-shopping",
    borderClass:"border-shopping"
  },
  "薬": {
    className:"cat-medicine",
    borderClass:"border-medicine"
  },
  "記念日": {
    className:"cat-anniversary",
    borderClass:"border-anniversary"
  },
  "その他": {
    className:"cat-other",
    borderClass:"border-other"
  }
};

function createId(){
  return "id-" + Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

function getCategoryMeta(category){
  return categoryMeta[category] || categoryMeta["その他"];
}

function normalizeScheduleItem(item){

  if(typeof item === "string"){
    return {
      id:createId(),
      category:"その他",
      time:"",
      text:item,
      memo:""
    };
  }

  return {
    id:item.id || createId(),
    category:item.category || "その他",
    time:item.time || "",
    text:item.text || "",
    memo:item.memo || ""
  };
}

function loadSchedulesData(){

  try{
    const raw = localStorage.getItem(scheduleStorageKey);

    if(raw){
      const parsed = JSON.parse(raw);
      const normalized = {};

      Object.keys(parsed).forEach(dateKey=>{
        const value = parsed[dateKey];

        if(Array.isArray(value)){
          normalized[dateKey] =
            value
            .map(normalizeScheduleItem)
            .filter(v=>v.text && v.text.trim());
        }else if(typeof value === "string" && value.trim()){
          normalized[dateKey] = [normalizeScheduleItem(value)];
        }
      });

      localStorage.setItem(
        scheduleStorageKey,
        JSON.stringify(normalized)
      );

      return normalized;
    }
  }catch(e){
  }

  try{
    const oldRaw = localStorage.getItem("calendarSchedules");

    if(oldRaw){
      const oldParsed = JSON.parse(oldRaw);
      const converted = {};

      Object.keys(oldParsed).forEach(dateKey=>{
        const value = oldParsed[dateKey];

        if(Array.isArray(value)){
          converted[dateKey] =
            value
            .map(normalizeScheduleItem)
            .filter(v=>v.text && v.text.trim());
        }else if(typeof value === "string" && value.trim()){
          converted[dateKey] = [normalizeScheduleItem(value)];
        }
      });

      localStorage.setItem(
        scheduleStorageKey,
        JSON.stringify(converted)
      );

      return converted;
    }
  }catch(e){
  }

  return {};
}

let schedules = loadSchedulesData();

function saveSchedulesData(){
  localStorage.setItem(
    scheduleStorageKey,
    JSON.stringify(schedules)
  );
}

function getDateKey(year, month, day){
  const y = year;
  const m = String(month + 1).padStart(2,"0");
  const d = String(day).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function getAnniversaryEventForDate(dateKey){

  const anniversaryDate = localStorage.getItem("anniversaryDate") || "";
  const anniversaryName =
    localStorage.getItem("anniversaryName") ||
    localStorage.getItem("anniversary") ||
    "";

  if(!anniversaryDate){
    return null;
  }

  const parts = anniversaryDate.split("-");
  if(parts.length !== 3){
    return null;
  }

  const month = parts[1];
  const day = parts[2];

  const dateParts = dateKey.split("-");
  const targetMonth = dateParts[1];
  const targetDay = dateParts[2];

  if(month === targetMonth && day === targetDay){
    return {
      id:"anniversary-" + month + day,
      category:"記念日",
      time:"",
      text:anniversaryName || "記念日",
      memo:"毎年くり返し表示される記念日です",
      isAnniversary:true
    };
  }

  return null;
}

function sortEvents(list){

  return [...list].sort((a,b)=>{

    if(a.isAnniversary && !b.isAnniversary) return -1;
    if(!a.isAnniversary && b.isAnniversary) return 1;

    const timeA = a.time || "99:99";
    const timeB = b.time || "99:99";

    return timeA.localeCompare(timeB);
  });
}

function getUserSchedules(dateKey){
  return Array.isArray(schedules[dateKey])
    ? schedules[dateKey]
    : [];
}

function getEventsForDate(dateKey){

  const list = [];
  const anniversaryEvent = getAnniversaryEventForDate(dateKey);

  if(anniversaryEvent){
    list.push(anniversaryEvent);
  }

  getUserSchedules(dateKey).forEach(item=>{
    list.push(item);
  });

  return sortEvents(list);
}

function clearScheduleInputs(){
  document.getElementById("scheduleCategory").value = "病院";
  document.getElementById("scheduleTime").value = "";
  document.getElementById("scheduleTitle").value = "";
  document.getElementById("scheduleMemo").value = "";
}

function openScheduleModal(dateKey){

  selectedDateKey = dateKey;

  const [y,m,d] = dateKey.split("-");

  document.getElementById("selectedDateLabel").innerHTML =
    `${y}年${Number(m)}月${Number(d)}日の予定`;

  renderScheduleList();
  clearScheduleInputs();

  document.getElementById("scheduleModal").style.display = "flex";
}

function closeScheduleModal(){
  document.getElementById("scheduleModal").style.display = "none";
}

function deleteScheduleById(dateKey, id){

  const list = getUserSchedules(dateKey).filter(item=>item.id !== id);

  if(list.length){
    schedules[dateKey] = list;
  }else{
    delete schedules[dateKey];
  }

  saveSchedulesData();
  renderScheduleList();
  renderCalendar();
}

function renderScheduleList(){

  const scheduleList = document.getElementById("scheduleList");
  const events = getEventsForDate(selectedDateKey);

  scheduleList.innerHTML = "";

  if(!events.length){
    scheduleList.innerHTML =
      `<div class="emptySchedule">この日の予定はまだありません</div>`;
    return;
  }

  events.forEach(event=>{

    const meta = getCategoryMeta(event.category);

    const item = document.createElement("div");
    item.className = "scheduleItem";

    const top = document.createElement("div");
    top.className = "scheduleItemTop";

    const metaWrap = document.createElement("div");
    metaWrap.className = "scheduleMeta";

    const category = document.createElement("span");
    category.className = "categoryBadge " + meta.className;
    category.textContent = event.category;
    metaWrap.appendChild(category);

    const time = document.createElement("span");
    time.className = "timeBadge";
    time.textContent = event.time || "終日";
    metaWrap.appendChild(time);

    top.appendChild(metaWrap);

    if(!event.isAnniversary){
      const delBtn = document.createElement("button");
      delBtn.className = "deleteSmallBtn";
      delBtn.textContent = "削除";
      delBtn.onclick = function(){
        deleteScheduleById(selectedDateKey, event.id);
      };
      top.appendChild(delBtn);
    }

    item.appendChild(top);

    const text = document.createElement("div");
    text.className = "scheduleText";
    text.textContent = event.text;
    item.appendChild(text);

    if(event.memo){
      const memo = document.createElement("div");
      memo.className = "scheduleMemo";
      memo.textContent = event.memo;
      item.appendChild(memo);
    }

    if(event.isAnniversary){
      const note = document.createElement("div");
      note.className = "readOnlyNote";
      note.textContent = "※ 記念日は設定画面から変更できます";
      item.appendChild(note);
    }

    scheduleList.appendChild(item);
  });
}

function addSchedule(){

  const category = document.getElementById("scheduleCategory").value;
  const time = document.getElementById("scheduleTime").value;
  const text = document.getElementById("scheduleTitle").value.trim();
  const memo = document.getElementById("scheduleMemo").value.trim();

  if(!text){
    alert("予定名を入力してください");
    return;
  }

  if(!schedules[selectedDateKey]){
    schedules[selectedDateKey] = [];
  }

  schedules[selectedDateKey].push({
    id:createId(),
    category:category,
    time:time,
    text:text,
    memo:memo
  });

  schedules[selectedDateKey] = sortEvents(schedules[selectedDateKey]);

  saveSchedulesData();
  renderScheduleList();
  renderCalendar();
  clearScheduleInputs();

  alert("予定を追加しました✨");
}

function renderCalendar(){

  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();

  document.getElementById("calendarTitle").innerHTML =
  `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const today = new Date();
  const calendar = document.getElementById("calendar");

  calendar.innerHTML = "";

  for(let i = 0; i < firstDay; i++){
    const empty = document.createElement("div");
    empty.className = "calendarCell empty";
    calendar.appendChild(empty);
  }

  for(let day = 1; day <= lastDate; day++){

    const dateKey = getDateKey(year, month, day);
    const events = getEventsForDate(dateKey);

    const isToday =
      today.getFullYear() === year &&
      today.getMonth() === month &&
      today.getDate() === day;

    const cell = document.createElement("div");
    cell.className = "calendarCell";

    if(isToday){
      cell.classList.add("today");
    }

    if(events.length > 0){
      cell.classList.add("hasEvent");
    }

    cell.onclick = function(){
      openScheduleModal(dateKey);
    };

    const dateNum = document.createElement("div");
    dateNum.className = "dateNum";
    dateNum.textContent = day;
    cell.appendChild(dateNum);

    if(events.length > 0){

      const count = document.createElement("div");
      count.className = "eventCount";
      count.textContent = events.length + "件";
      cell.appendChild(count);

      const badgeRow = document.createElement("div");
      badgeRow.className = "miniBadgeRow";

      const uniqueCategories = [...new Set(events.map(e=>e.category))].slice(0,3);

      uniqueCategories.forEach(category=>{
        const meta = getCategoryMeta(category);
        const badge = document.createElement("span");
        badge.className = "miniBadge " + meta.className;
        badge.textContent = category;
        badgeRow.appendChild(badge);
      });

      cell.appendChild(badgeRow);

      events.slice(0,2).forEach(event=>{
        const meta = getCategoryMeta(event.category);
        const line = document.createElement("div");
        line.className = "eventLine " + meta.borderClass;
        line.textContent =
          (event.time ? event.time + " " : "") + event.text;
        cell.appendChild(line);
      });

      if(events.length > 2){
        const more = document.createElement("div");
        more.className = "moreLine";
        more.textContent = "ほか " + (events.length - 2) + "件";
        cell.appendChild(more);
      }
    }

    calendar.appendChild(cell);
  }
}

function changeMonth(step){
  calendarDate.setMonth(calendarDate.getMonth() + step);
  renderCalendar();
}

renderCalendar();

async function reverseGeocode(lat, lon){
  try{
    const url =
      `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ja`;

    const res = await fetch(url);
    const data = await res.json();

    if(data && data.results && data.results.length > 0){
      const place = data.results[0];
      const admin1 = place.admin1 || "";
      const name = place.name || "";
      return `${admin1} ${name}`.trim();
    }
  }catch(e){
  }

  return "現在地";
}

async function fetchWeather(lat, lon){

  const weatherText = document.getElementById("weatherText");
  const weatherIcon = document.getElementById("weatherIcon");

  weatherText.innerHTML = "天気情報を取得しています...";
  weatherIcon.innerHTML = "📡";

  try{

    const placeName = await reverseGeocode(lat, lon);

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=1`;

    const res = await fetch(url);
    const data = await res.json();

    const code = data.current.weather_code;
    const weather = weatherCodeToJapanese(code);

    const currentTemp = Math.round(data.current.temperature_2m);
    const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
    const minTemp = Math.round(data.daily.temperature_2m_min[0]);
    const rain = Math.round(data.daily.precipitation_probability_max[0] ?? 0);

    weatherIcon.innerHTML = weather.icon;

    weatherText.innerHTML =
      `${placeName}<br>` +
      `${weather.text}<br>` +
      `現在 ${currentTemp}℃<br>` +
      `最高${maxTemp}℃ / 最低${minTemp}℃<br>` +
      `降水確率${rain}%`;

  }catch(error){

    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "天気情報の取得に失敗しました。<br>通信状態を確認してもう一度お試しください。";
  }
}

function loadWeatherByGPS(){

  const weatherText = document.getElementById("weatherText");
  const weatherIcon = document.getElementById("weatherIcon");

  if(!navigator.geolocation){
    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "この端末ではGPSが使えません。";
    return;
  }

  if(
    location.protocol !== "https:" &&
    location.hostname !== "localhost" &&
    location.hostname !== "127.0.0.1"
  ){
    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "GPSはHTTPS環境で動作します。<br>スマホで直接HTMLを開くと位置情報が使えない場合があります。";
    return;
  }

  weatherIcon.innerHTML = "📍";
  weatherText.innerHTML = "現在地を取得しています...";

  navigator.geolocation.getCurrentPosition(

    function(position){
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      localStorage.setItem("lastLat", lat);
      localStorage.setItem("lastLon", lon);

      fetchWeather(lat, lon);
    },

    function(error){

      weatherIcon.innerHTML = "⚠️";

      let msg = "GPSの取得に失敗しました。";

      switch(error.code){
        case error.PERMISSION_DENIED:
          msg = "位置情報の許可がOFFです。<br>ブラウザの位置情報を許可してください。";
          break;
        case error.POSITION_UNAVAILABLE:
          msg = "現在地を取得できませんでした。<br>電波状況をご確認ください。";
          break;
        case error.TIMEOUT:
          msg = "位置情報の取得がタイムアウトしました。<br>もう一度お試しください。";
          break;
      }

      weatherText.innerHTML = msg;

      const lastLat = localStorage.getItem("lastLat");
      const lastLon = localStorage.getItem("lastLon");

      if(lastLat && lastLon){
        fetchWeather(lastLat, lastLon);
      }
    },

    {
      enableHighAccuracy:true,
      timeout:10000,
      maximumAge:300000
    }
  );
}

loadWeatherByGPS();
