<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no
">

<meta
name="apple-mobile-web-app-capable"
content="yes">

<title>こころ日記 完全版DX+ iphone版</title>

<style>

:root{
  --baseFont:24px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html{
  scroll-behavior:smooth;
}

body{

  margin:0;

  padding:
  env(safe-area-inset-top)
  16px
  env(safe-area-inset-bottom)
  16px;

  min-height:100vh;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  sans-serif;

  font-size:var(--baseFont);

  color:#333;

  transition:0.5s;

  overflow-x:hidden;

}

/* 季節背景 */

.spring{
  background:
  linear-gradient(
    135deg,
    #ffe3ef,
    #fff8fb
  );
}

.summer{
  background:
  linear-gradient(
    135deg,
    #d9f6ff,
    #f0fcff
  );
}

.autumn{
  background:
  linear-gradient(
    135deg,
    #ffe0c1,
    #fff5e9
  );
}

.winter{
  background:
  linear-gradient(
    135deg,
    #edf5ff,
    #fafcff
  );
}

.container{
  max-width:760px;
  margin:auto;
}

.title{

  text-align:center;

  font-size:2em;

  font-weight:bold;

  color:#ff77aa;

  margin-bottom:20px;
}

.card{

  background:white;

  border-radius:28px;

  padding:22px;

  margin-bottom:20px;

  box-shadow:
  0 8px 20px
  rgba(0,0,0,0.08);
}

.sectionTitle{

  font-size:1.2em;

  font-weight:bold;

  color:#ff77aa;

  margin-bottom:14px;
}

.big{
  font-size:1.4em;
  font-weight:bold;
  line-height:1.7;
}

.time{
  font-size:1.2em;
  margin-top:10px;
}

button{

  width:100%;

  border:none;

  border-radius:22px;

  padding:18px;

  margin:6px 0;

  min-height:72px;

  font-size:1em;

  font-weight:bold;

  cursor:pointer;

  transition:0.2s;
}

button:active{
  transform:scale(0.98);
}

.mainBtn{
  background:#7dbef5;
  color:white;
}

.menuBtn{
  background:#ffe0ec;
}

.voice{
  background:#c9f7db;
}

.emergency{
  background:#ff8f8f;
  color:white;
}

textarea,
input{

  width:100%;

  border:none;

  border-radius:18px;

  padding:16px;

  margin-top:8px;
  margin-bottom:15px;

  font-size:1em;

  background:#f7f7f7;
}

textarea{
  height:110px;
  resize:none;
}

.selectBox{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin-top:8px;
  margin-bottom:15px;
  font-size:1em;
  background:#f7f7f7;
  color:#333;
}

.previewBox{

  background:#f7f7f7;

  padding:18px;

  border-radius:18px;

  line-height:1.8;

  margin-top:15px;
}

.settingPanel{

  max-height:0;

  overflow:hidden;

  opacity:0;

  transition:
  max-height 0.5s ease,
  opacity 0.4s ease;

}

.settingPanel.show{

  max-height:5000px;

  opacity:1;

  margin-top:15px;
}

.message{

  background:#fff4c8;

  border-radius:18px;

  padding:18px;

  line-height:1.9;
}

.weatherBox{
  line-height:1.9;
}

.small{
  font-size:0.8em;
  color:#666;
}

.menuGrid{

  display:grid;

  grid-template-columns:
  1fr 1fr;

  gap:10px;
}

.checkArea{

  background:#f7f7f7;

  padding:16px;

  border-radius:18px;

  line-height:2;
}

.chatUser{
  background:#eef7ff;
  padding:14px;
  border-radius:16px;
  margin-bottom:10px;
  line-height:1.8;
}

.chatMember{
  background:#fffaf4;
  padding:14px;
  border-radius:16px;
  margin-bottom:14px;
  line-height:1.8;
}

.aiBox{
  background:#f4fff7;
  padding:12px;
  border-radius:14px;
  margin-top:10px;
}

.memberThinking{
  opacity:0.9;
}

@media(max-width:600px){

  .menuGrid{
    grid-template-columns:1fr;
  }

}

</style>
</head>

<script>

/* 設定 */

function toggleSettings(){

  settings.classList.toggle(
    "show"
  );

}

function saveSettings(){

  const data = {

    name:userName.value,
    city:userCity.value,
    birthday:birthday.value,
    hobby:hobby.value,
    anniversary:anniversary.value,
    aiBlendRate:aiBlendRate.value,

    emergency1:emergency1.value,
    emergency2:emergency2.value,
    emergency3:emergency3.value,
    emergency4:emergency4.value,
    emergency5:emergency5.value

  };

  localStorage.setItem(
    "kokoroSettings",
    JSON.stringify(data)
  );

  alert("保存しました😊");

}

function loadSettings(){

  const data =

  JSON.parse(

    localStorage.getItem(
      "kokoroSettings"
    ) || "{}"

  );

  userName.value =
  data.name || "";

  userCity.value =
  data.city || "";

  birthday.value =
  data.birthday || "";

  hobby.value =
  data.hobby || "";

  anniversary.value =
  data.anniversary || "";

  aiBlendRate.value =
  data.aiBlendRate || "3";

  emergency1.value =
  data.emergency1 || "";

  emergency2.value =
  data.emergency2 || "";

  emergency3.value =
  data.emergency3 || "";

  emergency4.value =
  data.emergency4 || "";

  emergency5.value =
  data.emergency5 || "";

}

loadSettings();

/* 日時 */

function updateDateTime(){

  const now =
  new Date();

  const week = [

    "日曜日",
    "月曜日",
    "火曜日",
    "水曜日",
    "木曜日",
    "金曜日",
    "土曜日"

  ];

  let hour =
  now.getHours();

  const minute =
  String(
    now.getMinutes()
  ).padStart(2,"0");

  const ampm =
  hour >= 12
  ? "午後"
  : "午前";

  hour =
  hour % 12;

  if(hour === 0){
    hour = 12;
  }

  date.innerHTML =

  `📅 ${now.getFullYear()}年
  ${now.getMonth()+1}月
  ${now.getDate()}日
  ${week[now.getDay()]}`;

  time.innerHTML =
  `🕒 ${ampm}${hour}時${minute}分`;

}

setInterval(
  updateDateTime,
  1000
);

updateDateTime();

/* 季節背景 */

function setSeason(){

  const month =
  new Date().getMonth()+1;

  document.body.className="";

  if(month>=3 && month<=5){

    document.body.classList.add(
      "spring"
    );

  }else if(month>=6 && month<=8){

    document.body.classList.add(
      "summer"
    );

  }else if(month>=9 && month<=11){

    document.body.classList.add(
      "autumn"
    );

  }else{

    document.body.classList.add(
      "winter"
    );

  }

}

setSeason();

/* 天気 */

function translateWeather(text){

  const map = {

    "Sunny":"晴れ ☀️",
    "Clear":"快晴 ☀️",
    "Partly cloudy":"くもり時々晴れ ⛅",
    "Cloudy":"くもり ☁️",
    "Overcast":"厚いくもり ☁️",
    "Mist":"霧 🌫️",
    "Patchy rain nearby":"近くで雨 ☔",
    "Light rain":"小雨 ☔",
    "Moderate rain":"雨 ☔",
    "Heavy rain":"大雨 ☔",
    "Light snow":"小雪 ❄️",
    "Heavy snow":"大雪 ❄️"

  };

  return map[text] || text;

}

async function getWeather(){

  try{

    const res =
    await fetch(
      "https://wttr.in/?format=j1"
    );

    const data =
    await res.json();

    const current =
    data.current_condition[0];

    const today =
    data.weather[0];

    weather.innerHTML = `

    ⛅ ${
      translateWeather(
        current.weatherDesc[0].value
      )
    }

    <br><br>

    🌡️ 現在：
    ${current.temp_C}℃

    <br><br>

    🔥 最高気温：
    ${today.maxtempC}℃

    <br><br>

    ❄️ 最低気温：
    ${today.mintempC}℃

    `;

    weatherUpdate.innerHTML =
    "最終更新：" +
    new Date().toLocaleTimeString(
      "ja-JP"
    );

  }catch(e){

    weather.innerHTML =
    "⚠️ 天気取得失敗";

  }

}

getWeather();

/* 今日予定 */

function showTodaySchedule(){

  const today =

  JSON.parse(

    localStorage.getItem(
      "todaySchedules"
    ) || "[]"

  );

  todaySchedule.innerHTML =

  today.length

  ?

  today.map(s =>
    `・${s}`
  ).join("<br>")

  :

  "予定はありません😊";

}

function toggleTodayItem(text){

  let schedules =

  JSON.parse(

    localStorage.getItem(
      "todaySchedules"
    ) || "[]"

  );

  if(schedules.includes(text)){

    schedules =
    schedules.filter(
      s => s !== text
    );

  }else{

    schedules.push(text);

  }

  localStorage.setItem(
    "todaySchedules",
    JSON.stringify(schedules)
  );

  showTodaySchedule();

}

showTodaySchedule();

/* 明日 */

function showTomorrowPreview(){

  const tomorrow =

  JSON.parse(

    localStorage.getItem(
      "tomorrowSchedules"
    ) || "[]"

  );

  tomorrowPreview.innerHTML =

  tomorrow.length

  ?

  tomorrow.map(s =>
    `・${s}`
  ).join("<br>")

  :

  "明日の予定はありません😊";

}

function toggleTomorrowItem(text){

  let schedules =

  JSON.parse(

    localStorage.getItem(
      "tomorrowSchedules"
    ) || "[]"

  );

  if(schedules.includes(text)){

    schedules =
    schedules.filter(
      s => s !== text
    );

  }else{

    schedules.push(text);

  }

  localStorage.setItem(
    "tomorrowSchedules",
    JSON.stringify(schedules)
  );

  showTomorrowPreview();

}

showTomorrowPreview();

/* メモ */

memo.value =
localStorage.getItem(
  "memo"
) || "";

function escapeHtml(text){

  return String(text)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");

}

function formatDateTime(date){

  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,"0");
  const d = String(date.getDate()).padStart(2,"0");
  const h = String(date.getHours()).padStart(2,"0");
  const min = String(date.getMinutes()).padStart(2,"0");

  return `${y}/${m}/${d} ${h}:${min}`;

}

function renderMemoHistory(){

  const history =

  JSON.parse(

    localStorage.getItem(
      "memoHistory"
    ) || "[]"

  );

  memoHistoryList.innerHTML =

  history.length

  ?

  history.map(item => `

    <div style="
    background:#fffafc;
    padding:14px;
    border-radius:16px;
    margin-bottom:12px;
    ">

    <div class="small">
    🕒 ${item.savedAt}
    </div>

    <div style="
    margin-top:8px;
    line-height:1.8;
    ">
    ${escapeHtml(item.text)}
    </div>

    </div>

  `).join("")

  :

  "履歴はまだありません😊";

}

function toggleMemoHistoryPage(){

  if(
    memoHistoryPage.style.display === "none"
    ||
    memoHistoryPage.style.display === ""
  ){

    renderMemoHistory();

    memoHistoryPage.style.display =
    "block";

    memoHistoryPage.scrollIntoView({
      behavior:"smooth"
    });

  }else{

    memoHistoryPage.style.display =
    "none";

  }

}

function saveMemo(){

  localStorage.setItem(
    "memo",
    memo.value
  );

  const text =
  memo.value.trim();

  if(text){

    let history =

    JSON.parse(

      localStorage.getItem(
        "memoHistory"
      ) || "[]"

    );

    history.unshift({
      text:text,
      savedAt:formatDateTime(
        new Date()
      )
    });

    if(history.length > 100){
      history = history.slice(0,100);
    }

    localStorage.setItem(
      "memoHistory",
      JSON.stringify(history)
    );

  }

  renderMemoHistory();

  alert("保存しました😊");

}

/* お薬 */

function saveMedicine(){

  const data = {

    morning:
    morning.checked,

    noon:
    noon.checked,

    night:
    night.checked

  };

  localStorage.setItem(
    "medicine",
    JSON.stringify(data)
  );

}

function loadMedicine(){

  const data =

  JSON.parse(

    localStorage.getItem(
      "medicine"
    ) || "{}"

  );

  morning.checked =
  data.morning || false;

  noon.checked =
  data.noon || false;

  night.checked =
  data.night || false;

}

loadMedicine();

document
.querySelectorAll(
  "input[type='checkbox']"
)
.forEach(el => {

  el.addEventListener(
    "change",
    saveMedicine
  );

});

/* 音声 */

function readSchedule(){

  const schedules =

  JSON.parse(

    localStorage.getItem(
      "todaySchedules"
    ) || "[]"

  );

  let text =

  schedules.length

  ?

  "今日の予定を読み上げます。" +
  schedules.join("。")

  :

  "今日の予定はありません";

  const speech =
  new SpeechSynthesisUtterance(
    text
  );

  speech.lang = "ja-JP";

  speech.rate = 0.9;

  speechSynthesis.cancel();

  speechSynthesis.speak(
    speech
  );

}

/* 緊急 */

let emergencyOpen = false;

function showEmergencyContacts(){

  const data =

  JSON.parse(

    localStorage.getItem(
      "kokoroSettings"
    ) || "{}"

  );

  let html = "";

  for(let i=1;i<=5;i++){

    const value =
    data["emergency"+i];

    if(value){

      html += `

      <div style="
      background:#fff4c8;
      padding:14px;
      border-radius:16px;
      margin-bottom:10px;
      ">

      📞 ${escapeHtml(value)}

      </div>

      `;

    }

  }

  if(html===""){

    html="未設定です😊";

  }

  if(emergencyOpen){

    emergencyList.style.display =
    "none";

    emergencyOpen = false;

    return;

  }

  emergencyList.innerHTML =
  html;

  emergencyList.style.display =
  "block";

  emergencyOpen = true;

}

      Math.random()
      * arr.length

  ];

/* 会話機能 */

function getSettingsData(){
  return JSON.parse(
    localStorage.getItem("kokoroSettings") || "{}"
  );
}

function getAiBlendRate(){
  const settings = getSettingsData();
  const rate = Number(settings.aiBlendRate || 3);
  return Math.min(5, Math.max(1, rate));
}

function chooseMember(selected){

  if(
    selected &&
    selected !== "ランダム"
  ){
    return selected;
  }

  return randomItem(members);

}

function getUserCallName(){

  const settings =
  getSettingsData();

  return settings.name
  ? `${settings.name}さん`
  : "あなた";

}

function getKeywordReply(member, text){

  const t =
  (text || "").trim();

  if(!t){
    return "";
  }

  if(
    t.includes("疲") ||
    t.includes("しんど") ||
    t.includes("つら") ||
    t.includes("苦しい")
  ){
    return `${member}「今日はがんばりすぎないでね。少し休憩しよう🌿」`;
  }

  if(
    t.includes("嬉") ||
    t.includes("楽") ||
    t.includes("最高") ||
    t.includes("よかった")
  ){
    return `${member}「それはすごくいいね😊 その気持ち大事にしよう✨」`;
  }

  if(
    t.includes("仕事") ||
    t.includes("学校") ||
    t.includes("勉強") ||
    t.includes("バイト")
  ){
    return `${member}「ちゃんと向き合っていてえらいよ。終わったらゆっくりしようね☕」`;
  }

  if(
    t.includes("眠") ||
    t.includes("夜") ||
    t.includes("寝")
  ){
    return `${member}「今日はあたたかくして、ゆっくり休もうね🌙」`;
  }

  if(
    t.includes("病院") ||
    t.includes("体調") ||
    t.includes("薬")
  ){
    return `${member}「無理せず、体をいちばん大事にしてね💊」`;
  }

  if(
    t.includes("ありがとう") ||
    t.includes("助かった")
  ){
    return `${member}「こちらこそ、話してくれてありがとう🌸」`;
  }

  if(
    t.includes("不安") ||
    t.includes("心配")
  ){
    return `${member}「不安なときは、一つずつゆっくりで大丈夫だよ🌷」`;
  }

  return "";

}

function createBaseReply(member, userText){

  const callName =
  getUserCallName();

  const keywordReply =
  getKeywordReply(member, userText);

  const timeLine =
  randomItem(timeMessages);

  const seasonLine =
  randomItem(seasonMessages);

  const greetLine =
  randomItem(greetings);

  const catchLine =
  memberStyles[member]
  ? memberStyles[member].catch
  : "ゆっくりで大丈夫だよ😊";

  if(keywordReply){

    return `
      ${member}より💌
      <br><br>
      ${callName}、メッセージありがとう😊
      <br><br>
      ${keywordReply}
      <br><br>
      ${timeLine}
      <br><br>
      ${catchLine}
    `;

  }

  return `
    ${member}より💌
    <br><br>
    ${callName}、話しかけてくれてありがとう😊
    <br><br>
    「${greetLine}」
    <br><br>
    「${timeLine}」
    <br><br>
    「${seasonLine}」
    <br><br>
    ${catchLine}
  `;

}

    "少しだけ深呼吸して、自分にやさしくしてあげてね。",

    "小さな前進でも、それは立派な一歩だよ。",
    "今ここまで来ていること自体、ちゃんと頑張っている証拠だよ。"

  ];

  if(
    userText &&
    userText.trim()
  ){

  }

  return `${member} AIひとこと✨「${randomItem(softIdeas)}」`;

}

async function buildHybridReply(member, userText){

  const baseReply =
  createBaseReply(member, userText);

  const aiRate =
  getAiBlendRate() / 100;

  const useAi =
  Math.random() < aiRate;

  if(!useAi){
    return baseReply;
  }

  const aiLine =
  createPseudoAiLine(member, userText);

  return `
    ${baseReply}
    <br><br>
    <div class="aiBox">
      ${aiLine}
    </div>
  `;

}

function getNowText(){
  return formatDateTime(
    new Date()
  );
}

function saveChatHistory(userText, member, replyHtml){

  let history =
  JSON.parse(
    localStorage.getItem("chatHistory") || "[]"
  );

  history.unshift({
    userText:userText,
    member:member,
    replyHtml:replyHtml,
    savedAt:getNowText()
  });

  if(history.length > 100){
    history = history.slice(0,100);
  }

  localStorage.setItem(
    "chatHistory",
    JSON.stringify(history)
  );

}

function renderChatHistory(){

  const history =
  JSON.parse(
    localStorage.getItem("chatHistory") || "[]"
  );

  chatHistoryList.innerHTML =
  history.length
  ?
  history.map(item => `
    <div class="chatUser">
      <div class="small">🕒 ${item.savedAt}</div>
      <div>あなた：${escapeHtml(item.userText)}</div>
    </div>
    <div class="chatMember">
      <div>${item.replyHtml}</div>
    </div>
  `).join("")
  :
  "履歴はまだありません😊";

}

function toggleChatHistoryPage(){

  if(
    chatHistoryPage.style.display === "none"
    ||
    chatHistoryPage.style.display === ""
  ){

    renderChatHistory();

    chatHistoryPage.style.display =
    "block";

    chatHistoryPage.scrollIntoView({
      behavior:"smooth"
    });

  }else{

    chatHistoryPage.style.display =
    "none";

  }

}

function saveLatestReply(replyHtml){

  localStorage.setItem(
    "latestMemberReply",
    replyHtml
  );

  localStorage.setItem(
    "latestMemberReplyTime",
    getNowText()
  );

}

function loadLatestReply(){

  const reply =
  localStorage.getItem(
    "latestMemberReply"
  );

  const savedTime =
  localStorage.getItem(
    "latestMemberReplyTime"
  );

  if(reply){
    memberReplyArea.innerHTML = reply;
  }

  if(savedTime){
    memberReplyTime.innerHTML =
    "返信時刻：" + savedTime;
  }

}

async function sendUserMessage(){

  const userText =
  userMessage.value.trim();

  if(!userText){
    alert("メッセージを入力してください😊");
    return;
  }

  const selected =
  talkMember.value;

  const member =
  chooseMember(selected);

  memberReplyArea.innerHTML =
  `<div class="memberThinking">${member} が考え中です…💭</div>`;

  const replyHtml =
  await buildHybridReply(member, userText);

  memberReplyArea.innerHTML =
  replyHtml;

  memberReplyTime.innerHTML =
  "返信時刻：" + getNowText();

  saveChatHistory(
    userText,
    member,
    replyHtml
  );

  saveLatestReply(replyHtml);

  userMessage.value = "";

}

userMessage.addEventListener(
  "keydown",
  function(e){

    if(
      e.key === "Enter" &&
      !e.shiftKey
    ){
      e.preventDefault();
      sendUserMessage();
    }

);

document
