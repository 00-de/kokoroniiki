<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no
">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffd9ec">

<title>DayDreamプラス Life</title>

<style>

:root{
  --bg1:#fff5fb;
  --bg2:#eef7ff;
  --card:#ffffff;
  --text:#444;
  --accent:#ff7fb0;
  --shadow:0 8px 24px rgba(0,0,0,0.08);
  --fontSize:22px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  sans-serif;
  background:
  linear-gradient(
  180deg,
  var(--bg1),
  var(--bg2)
  );
  color:var(--text);
  min-height:100vh;
  padding:
  env(safe-area-inset-top)
  16px
  calc(100px + env(safe-area-inset-bottom))
  16px;
  font-size:var(--fontSize);
  transition:0.3s;
}

.card{
  background:var(--card);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

.title{
  font-size:1.4em;
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
}

.subText{
  text-align:center;
  color:#777;
  font-size:0.9em;
  margin-top:6px;
  line-height:1.6;
}

.bigDate{
  font-size:1.2em;
  font-weight:bold;
  text-align:center;
  line-height:1.7;
}

.time{
  font-size:2.2em;
  text-align:center;
  font-weight:bold;
  color:var(--accent);
}

.weather{
  text-align:center;
  line-height:1.8;
}

.weatherIcon{
  font-size:2.2em;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin-top:10px;
  font-size:1em;
  background:#ffe1ef;
  color:#444;
  cursor:pointer;
}

.btn:active{
  transform:scale(0.98);
}

.check{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

input[type="checkbox"]{
  width:28px;
  height:28px;
}

.moodGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.moodBtn{
  border:none;
  border-radius:20px;
  padding:18px;
  font-size:1em;
  background:#eef4ff;
  cursor:pointer;
}

.message{
  line-height:1.8;
  font-weight:bold;
  color:#ff6699;
}

.member{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:#fff7fb;
}

.settings{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:white;
  font-size:28px;
  box-shadow:var(--shadow);
  cursor:pointer;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modalContent{
  width:92%;
  max-height:85vh;
  overflow:auto;
  background:white;
  border-radius:28px;
  padding:20px;
}

input,select,textarea{
  width:100%;
  padding:16px;
  margin-top:10px;
  margin-bottom:16px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:1em;
  font-family:inherit;
}

textarea{
  min-height:140px;
  resize:vertical;
}

.fontButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.calendarHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.calendarTitle{
  font-weight:bold;
  text-align:center;
  flex:1;
}

.calendarWeek,
.calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.calendarWeek div{
  text-align:center;
  font-weight:bold;
  color:#888;
  padding:8px 0;
}

.calendarCell{
  background:#fff7fb;
  border-radius:16px;
  min-height:88px;
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  justify-content:flex-start;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
  padding:8px 6px;
  cursor:pointer;
}

.calendarCell.empty{
  background:transparent;
  box-shadow:none;
  cursor:default;
}

.calendarCell.today{
  background:#ff7fb0;
  color:white;
  font-weight:bold;
}

.dateNum{
  align-self:flex-end;
  font-weight:bold;
}

.scheduleDot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  margin-top:6px;
}

.calendarCell.today .scheduleDot{
  background:white;
}

.schedulePreview{
  font-size:0.58em;
  line-height:1.45;
  margin-top:6px;
  color:#666;
  word-break:break-word;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

.calendarCell.today .schedulePreview{
  color:white;
}

.miniBtn{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  background:#ffe1ef;
  color:#444;
  font-size:1em;
  cursor:pointer;
}

.selectedDateLabel{
  text-align:center;
  font-weight:bold;
  color:#ff6699;
  margin-bottom:10px;
  line-height:1.6;
}

.footerSpace{
  height:60px;
}

</style>
</head>
<body>

<div class="card">
  <div class="title">🌸 DayDreamプラス Life</div>
  <div class="bigDate" id="date"></div>
  <div class="time" id="time"></div>
</div>

<div class="card weather">
  <div class="weatherIcon" id="weatherIcon">📍</div>
  <div id="weatherText">
    現在地の天気を取得しています...
  </div>
  <button class="btn" onclick="loadWeatherByGPS()">
    現在地の天気を再取得
  </button>
</div>

<div class="card">

  <div class="title">📅 カレンダー</div>

  <div class="calendarHeader">
    <button class="miniBtn" onclick="changeMonth(-1)">←</button>
    <div class="calendarTitle" id="calendarTitle"></div>
    <button class="miniBtn" onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendarWeek">
    <div>日</div>
    <div>月</div>
    <div>火</div>
    <div>水</div>
    <div>木</div>
    <div>金</div>
    <div>土</div>
  </div>

  <div class="calendarGrid" id="calendar"></div>

  <div class="subText">
    日付をタップすると予定を登録できます✨
  </div>

</div>

<div class="card">

  <div class="title">💊 薬チェック</div>

  <label class="check">
    <input type="checkbox" id="morning">
    朝の薬
  </label>

  <label class="check">
    <input type="checkbox" id="noon">
    昼の薬
  </label>

  <label class="check">
    <input type="checkbox" id="night">
    夜の薬
  </label>

</div>

<div class="card">

  <div class="title">😊 今日の気分</div>

  <div class="moodGrid">

    <button class="moodBtn" onclick="setMood('😊 元気')">
      😊 元気
    </button>

    <button class="moodBtn" onclick="setMood('🙂 普通')">
      🙂 普通
    </button>

    <button class="moodBtn" onclick="setMood('😢 疲れた')">
      😢 疲れた
    </button>

    <button class="moodBtn" onclick="setMood('😴 眠い')">
      😴 眠い
    </button>

  </div>

</div>

<div class="card">

  <div class="title">🌈 DayDreamメッセージ</div>

  <div class="member">
    <div class="message" id="messageArea"></div>
  </div>

</div>

<div class="card">

  <div class="title">🎂 記念日</div>

  <div id="anniversaryText">
    記念日を設定してください✨
  </div>

</div>

<button class="settings" onclick="openSettings()">
⚙️
</button>

<div class="modal" id="modal">
  <div class="modalContent">

    <div class="title">⚙️ 設定</div>

    <input type="text" id="name" placeholder="名前">
    <input type="text" id="nickname" placeholder="あだ名">
    <input type="text" id="city" placeholder="住んでいる地域">
    <input type="date" id="birthday">
    <input type="text" id="hobby" placeholder="趣味">
    <input type="text" id="anniversary" placeholder="記念日">

    <div class="title">🔠文字サイズ</div>

    <div class="fontButtons">
      <button class="btn" onclick="setFont(18)">小</button>
      <button class="btn" onclick="setFont(22)">中</button>
      <button class="btn" onclick="setFont(28)">大</button>
      <button class="btn" onclick="setFont(34)">最大</button>
    </div>

    <button class="btn" onclick="saveSettings()">
      保存
    </button>

    <button class="btn" onclick="closeSettings()">
      閉じる
    </button>

  </div>
</div>

<div class="modal" id="scheduleModal">
  <div class="modalContent">

    <div class="title">🗓️ 予定入力</div>

    <div class="selectedDateLabel" id="selectedDateLabel"></div>

    <textarea id="scheduleInput" placeholder="ここに予定を書いてください&#10;例）10:00 病院&#10;14:00 買い物"></textarea>

    <button class="btn" onclick="saveSchedule()">
      予定を保存
    </button>

    <button class="btn" onclick="deleteSchedule()">
      この日の予定を削除
    </button>

    <button class="btn" onclick="closeScheduleModal()">
      閉じる
    </button>

  </div>
</div>

<div class="footerSpace"></div>

<script>

function updateClock(){

  const now = new Date();

  const week = [
    "日","月","火","水","木","金","土"
  ];

  const reiwa = now.getFullYear() - 2018;

  const h = now.getHours();
  const ampm = h >= 12 ? "午後" : "午前";
  const hh = String(h % 12 || 12).padStart(2,"0");
  const mm = String(now.getMinutes()).padStart(2,"0");

  document.getElementById("date").innerHTML =
  `
  令和${reiwa}年
  ${now.getMonth()+1}月
  ${now.getDate()}日
  (${week[now.getDay()]}曜日)
  `;

  document.getElementById("time").innerHTML =
  `${ampm} ${hh}:${mm}`;
}

setInterval(updateClock,1000);
updateClock();

const messages = [
"悠真：今日はゆっくりでも大丈夫☺️",
"結衣：頑張ってるのちゃんと知ってるよ✨",
"蓮：焦らなくて大丈夫！",
"葵：笑顔でいこうね🌸",
"大地：元気出していこう！",
"美琴：あなたは一人じゃないよ🌈"
];

function randomMessage(){
  const msg =
  messages[
    Math.floor(Math.random()*messages.length)
  ];

  document.getElementById("messageArea").innerHTML = msg;
}

randomMessage();

function setMood(mood){
  localStorage.setItem("mood",mood);
  alert("保存しました✨\n" + mood);
  randomMessage();
}

function saveChecks(){
  localStorage.setItem(
    "morning",
    document.getElementById("morning").checked
  );

  localStorage.setItem(
    "noon",
    document.getElementById("noon").checked
  );

  localStorage.setItem(
    "night",
    document.getElementById("night").checked
  );
}

["morning","noon","night"].forEach(id=>{
  document
  .getElementById(id)
  .addEventListener("change",saveChecks);
});

function loadChecks(){
  ["morning","noon","night"].forEach(id=>{
    document.getElementById(id).checked =
    localStorage.getItem(id)==="true";
  });
}

loadChecks();

function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversary"
  ];

  ids.forEach(id=>{
    localStorage.setItem(
      id,
      document.getElementById(id).value
    );
  });

  document.getElementById("anniversaryText").innerHTML =
  document.getElementById("anniversary").value
  ? "🎉 " + document.getElementById("anniversary").value
  : "記念日を設定してください✨";

  alert("保存しました✨");
  closeSettings();
}

function loadSettings(){

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversary"
  ];

  ids.forEach(id=>{
    document.getElementById(id).value =
    localStorage.getItem(id)||"";
  });

  const savedAnniversary = localStorage.getItem("anniversary");

  document.getElementById("anniversaryText").innerHTML =
  savedAnniversary
  ? "🎉 " + savedAnniversary
  : "記念日を設定してください✨";
}

loadSettings();

function setFont(size){
  document.documentElement.style
  .setProperty("--fontSize",size+"px");

  localStorage.setItem("fontSize",size);
}

const savedFont = localStorage.getItem("fontSize");

if(savedFont){
  setFont(savedFont);
}

let calendarDate = new Date(
  new Date().getFullYear(),
  new Date().getMonth(),
  1
);

const scheduleStorageKey = "calendarSchedules";
let schedules = JSON.parse(
  localStorage.getItem(scheduleStorageKey) || "{}"
);

let selectedDateKey = "";

function getDateKey(year, month, day){
  const y = year;
  const m = String(month + 1).padStart(2,"0");
  const d = String(day).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function openScheduleModal(dateKey){

  selectedDateKey = dateKey;

  const [y,m,d] = dateKey.split("-");

  document.getElementById("selectedDateLabel").innerHTML =
  `${y}年${Number(m)}月${Number(d)}日の予定`;

  document.getElementById("scheduleInput").value =
  schedules[dateKey] || "";

  document.getElementById("scheduleModal").style.display = "flex";
}

function closeScheduleModal(){
  document.getElementById("scheduleModal").style.display = "none";
}

function saveSchedule(){

  const text = document.getElementById("scheduleInput").value.trim();

  if(text){
    schedules[selectedDateKey] = text;
  }else{
    delete schedules[selectedDateKey];
  }

  localStorage.setItem(
    scheduleStorageKey,
    JSON.stringify(schedules)
  );

  renderCalendar();
  closeScheduleModal();
  alert("予定を保存しました✨");
}

function deleteSchedule(){

  if(selectedDateKey && schedules[selectedDateKey]){
    delete schedules[selectedDateKey];

    localStorage.setItem(
      scheduleStorageKey,
      JSON.stringify(schedules)
    );
  }

  document.getElementById("scheduleInput").value = "";
  renderCalendar();
  closeScheduleModal();
  alert("予定を削除しました✨");
}

function renderCalendar(){

  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();

  document.getElementById("calendarTitle").innerHTML =
  `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const today = new Date();
  const calendar = document.getElementById("calendar");

  calendar.innerHTML = "";

  for(let i = 0; i < firstDay; i++){
    const empty = document.createElement("div");
    empty.className = "calendarCell empty";
    calendar.appendChild(empty);
  }

  for(let day = 1; day <= lastDate; day++){

    const dateKey = getDateKey(year, month, day);

    const isToday =
      today.getFullYear() === year &&
      today.getMonth() === month &&
      today.getDate() === day;

    const cell = document.createElement("div");
    cell.className = "calendarCell" + (isToday ? " today" : "");
    cell.onclick = function(){
      openScheduleModal(dateKey);
    };

    const dateNum = document.createElement("div");
    dateNum.className = "dateNum";
    dateNum.textContent = day;
    cell.appendChild(dateNum);

    if(schedules[dateKey]){

      const dot = document.createElement("div");
      dot.className = "scheduleDot";
      cell.appendChild(dot);

      const preview = document.createElement("div");
      preview.className = "schedulePreview";
      preview.textContent = schedules[dateKey];
      cell.appendChild(preview);
    }

    calendar.appendChild(cell);
  }
}

function changeMonth(step){
  calendarDate.setMonth(calendarDate.getMonth() + step);
  renderCalendar();
}

renderCalendar();

function weatherCodeToJapanese(code){

  const map = {
    0: { text:"快晴", icon:"☀️" },
    1: { text:"晴れ", icon:"🌤️" },
    2: { text:"晴れ時々くもり", icon:"⛅" },
    3: { text:"くもり", icon:"☁️" },
    45: { text:"霧", icon:"🌫️" },
    48: { text:"霧", icon:"🌫️" },
    51: { text:"弱い霧雨", icon:"🌦️" },
    53: { text:"霧雨", icon:"🌦️" },
    55: { text:"強い霧雨", icon:"🌧️" },
    56: { text:"弱い着氷性の霧雨", icon:"🌧️" },
    57: { text:"強い着氷性の霧雨", icon:"🌧️" },
    61: { text:"弱い雨", icon:"🌦️" },
    63: { text:"雨", icon:"🌧️" },
    65: { text:"強い雨", icon:"🌧️" },
    66: { text:"弱い着氷性の雨", icon:"🌧️" },
    67: { text:"強い着氷性の雨", icon:"🌧️" },
    71: { text:"弱い雪", icon:"❄️" },
    73: { text:"雪", icon:"❄️" },
    75: { text:"大雪", icon:"❄️" },
    77: { text:"雪の粒", icon:"❄️" },
    80: { text:"にわか雨", icon:"🌦️" },
    81: { text:"やや強いにわか雨", icon:"🌧️" },
    82: { text:"激しいにわか雨", icon:"⛈️" },
    85: { text:"にわか雪", icon:"🌨️" },
    86: { text:"激しいにわか雪", icon:"🌨️" },
    95: { text:"雷雨", icon:"⛈️" },
    96: { text:"ひょうを伴う雷雨", icon:"⛈️" },
    99: { text:"激しい雷雨", icon:"⛈️" }
  };

  return map[code] || { text:"天気情報取得", icon:"🌈" };
}

async function reverseGeocode(lat, lon){
  try{
    const url =
      `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ja`;

    const res = await fetch(url);
    const data = await res.json();

    if(data && data.results && data.results.length > 0){
      const place = data.results[0];
      const admin1 = place.admin1 || "";
      const name = place.name || "";
      return `${admin1} ${name}`.trim();
    }
  }catch(e){
  }

  return "現在地";
}

async function fetchWeather(lat, lon){

  const weatherText = document.getElementById("weatherText");
  const weatherIcon = document.getElementById("weatherIcon");

  weatherText.innerHTML = "天気情報を取得しています...";
  weatherIcon.innerHTML = "📡";

  try{

    const placeName = await reverseGeocode(lat, lon);

    const url =
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=auto&forecast_days=1`;

    const res = await fetch(url);
    const data = await res.json();

    const code = data.current.weather_code;
    const weather = weatherCodeToJapanese(code);

    const currentTemp = Math.round(data.current.temperature_2m);
    const maxTemp = Math.round(data.daily.temperature_2m_max[0]);
    const minTemp = Math.round(data.daily.temperature_2m_min[0]);
    const rain = Math.round(data.daily.precipitation_probability_max[0] ?? 0);

    weatherIcon.innerHTML = weather.icon;

    weatherText.innerHTML =
      `${placeName}<br>` +
      `${weather.text}<br>` +
      `現在 ${currentTemp}℃<br>` +
      `最高${maxTemp}℃ / 最低${minTemp}℃<br>` +
      `降水確率${rain}%`;

  }catch(error){

    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "天気情報の取得に失敗しました。<br>通信状態を確認してもう一度お試しください。";
  }
}

function loadWeatherByGPS(){

  const weatherText = document.getElementById("weatherText");
  const weatherIcon = document.getElementById("weatherIcon");

  if(!navigator.geolocation){
    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "この端末ではGPSが使えません。";
    return;
  }

  if(
    location.protocol !== "https:" &&
    location.hostname !== "localhost" &&
    location.hostname !== "127.0.0.1"
  ){
    weatherIcon.innerHTML = "⚠️";
    weatherText.innerHTML =
      "GPSはHTTPS環境で動作します。<br>スマホで直接HTMLを開くと位置情報が使えない場合があります。";
    return;
  }

  weatherIcon.innerHTML = "📍";
  weatherText.innerHTML = "現在地を取得しています...";

  navigator.geolocation.getCurrentPosition(

    function(position){
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      localStorage.setItem("lastLat", lat);
      localStorage.setItem("lastLon", lon);

      fetchWeather(lat, lon);
    },

    function(error){

      weatherIcon.innerHTML = "⚠️";

      let msg = "GPSの取得に失敗しました。";

      switch(error.code){
        case error.PERMISSION_DENIED:
          msg = "位置情報の許可がOFFです。<br>ブラウザの位置情報を許可してください。";
          break;
        case error.POSITION_UNAVAILABLE:
          msg = "現在地を取得できませんでした。<br>電波状況をご確認ください。";
          break;
        case error.TIMEOUT:
          msg = "位置情報の取得がタイムアウトしました。<br>もう一度お試しください。";
          break;
      }

      weatherText.innerHTML = msg;

      const lastLat = localStorage.getItem("lastLat");
      const lastLon = localStorage.getItem("lastLon");

      if(lastLat && lastLon){
        fetchWeather(lastLat, lastLon);
      }
    },
