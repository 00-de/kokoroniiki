<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>健康アプリ ホームDX+</title>

<style>
:root{
  --bg1:#ffe1f5;
  --bg2:#d7f0ff;
  --card:#ffffffcc;
  --text:#222;
}
body{
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--text);
}
.header{
  padding:20px;
  text-align:center;
  font-weight:bold;
}
.big{
  font-size:28px;
}
.medium{
  font-size:20px;
}
.small{
  font-size:16px;
}
.card{
  margin:15px;
  padding:15px;
  background:var(--card);
  border-radius:16px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}
button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}
input,select{
  padding:10px;
  border-radius:10px;
  border:1px solid #ccc;
  width:100%;
  margin-top:5px;
}
.flex{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

#settingsPanel{
  display:none;
}
</style>
</head>
<body>

<div class="header big" id="dateTime"></div>

<div class="card">
  <div id="weather">天気読み込み中...</div>
</div>

<div class="card">
  <button onclick="takeMed()">💊 薬飲んだ</button>
  <div id="medStatus"></div>
</div>

<div class="card">
  今日の気分
  <select id="mood">
    <option>😊 いい感じ</option>
    <option>🙂 普通</option>
    <option>😐 まあまあ</option>
    <option>😢 悪い</option>
  </select>
</div>

<div class="card">
  <div id="memberMsg"></div>
</div>

<div class="card flex">
  <button onclick="changeFont('small')">小</button>
  <button onclick="changeFont('medium')">中</button>
  <button onclick="changeFont('big')">大</button>
  <button onclick="toggleSettings()">⚙️設定</button>
</div>

<div class="card" id="settingsPanel">
  <h3>設定</h3>
  <label>名前/あだ名</label>
  <input id="name" />

  <label>市町村</label>
  <input id="city" />

  <label>誕生日</label>
  <input id="birthday" type="date" />

  <label>趣味</label>
  <input id="hobby" />

  <label>記念日</label>
  <input id="anniv" type="date" />

  <button onclick="saveSettings()">保存</button>
</div>

<script>
// ===== 永続化 =====
function save(key,val){localStorage.setItem(key,JSON.stringify(val));}
function load(key,def){
  const raw = localStorage.getItem(key);
  if(raw===null) return def;
  try{
    return JSON.parse(raw);
  }catch(e){
    return def;
  }
}

// ===== 時間 =====
function updateTime(){
  const now=new Date();
  const jp = new Intl.DateTimeFormat('ja-JP',{dateStyle:'full',timeStyle:'short'}).format(now);
  document.getElementById('dateTime').innerText="令和表示: "+jp;
}
setInterval(updateTime,1000);
updateTime();

// ===== 薬 =====
function takeMed(){
  const today=new Date().toDateString();
  save('med',today);
  document.getElementById('medStatus').innerText="✔ 今日の薬OK";
}
(function(){
  if(load('med')===new Date().toDateString()){
    document.getElementById('medStatus').innerText="✔ 今日の薬OK";
  }
})();

// ===== 気分 =====
document.getElementById('mood').onchange=()=>{
  save('mood',document.getElementById('mood').value);
}
(function(){
  const savedMood = load('mood','😊 いい感じ');
  document.getElementById('mood').value = savedMood;
})();

// ===== 天気連動メッセージ用状態 =====
let weatherContext = {
  city: load('city','Tokyo'),
  tmax: null,
  tmin: null,
  rain: null,
  weatherType: 'default'
};
let weatherLinkedMsgs = [];
let memberMsgTimer = null;
const MEMBER_MSG_INTERVAL = 4 * 60 * 60 * 1000; // 4時間

function detectWeatherType(tmax, rain){
  if(rain >= 70) return 'rainy';
  if(tmax >= 30) return 'hot';
  if(tmax <= 10) return 'cold';
  return 'mild';
}

function buildWeatherLead(ctx){
  switch(ctx.weatherType){
    case 'rainy': return '今日は雨に備えつつ';
    case 'hot': return '今日は暑さに気をつけながら';
    case 'cold': return '今日は冷えに気をつけながら';
    case 'mild': return '今日は過ごしやすい空気を感じつつ';
    default: return '今日の空気に合わせて';
  }
}

function generateWeatherLinkedMessages(ctx){
  const displayName = load('name','').trim() || 'あなた';
  const hobby = load('hobby','').trim();
  const city = ctx.city || load('city','Tokyo');
  const hobbyText = hobby ? `、${hobby}も少し楽しみつつ` : '';
  const weatherLead = buildWeatherLead(ctx);
  const tempText = (ctx.tmax !== null && ctx.tmin !== null)
    ? `最高${ctx.tmax}℃・最低${ctx.tmin}℃`
    : '今日の体調第一で';
  const rainText = (ctx.rain !== null)
    ? `降水${ctx.rain}%`
    : '空模様を見ながら';

  const intros = [
    `${displayName}さん、`,`${displayName}さんなら、`,`今日は${displayName}さんのペースで、`,`焦らず${displayName}さんらしく、`,`ひとつずつ${displayName}さんの歩幅で、`,
    `${city}の空気を感じながら、`,`今日もやさしく、`,`大丈夫、`,`今のままで十分、`,`深呼吸してから、`,
    `朝でも昼でも夜でも、`,`無理を増やさず、`,`気楽に、`,`落ち着いて、`,`少しずつ、`,
    `丁寧に、`,`やさしく、`,`ゆったり、`,`自然体で、`,`自分を大切にしながら、`,
    `今日も一歩、`,`心と体をいたわりながら、`,`自分のリズムで、`,`安心して、`,`穏やかな気持ちで、`
  ];

  const supports = [
    `${weatherLead}過ごしていきましょう`,
    `${tempText}だからこそ休憩も大切です`,
    `${rainText}なので予定はゆるめでも大丈夫です`,
    `${city}の今日に合う落ち着いた行動がぴったりです`,
    `水分補給を忘れずにいきましょう`,
    `肩の力を抜いて進めば十分です`,
    `急がなくてもちゃんと前に進めています`,
    `体調を優先するのがいちばんです`,
    `できたことをひとつ見つけるだけで十分です`,
    `今日は小さな達成感を大事にしましょう`,
    `無理をしない判断も立派な前進です`,
    `休む勇気もいい選択です`,
    `深呼吸ひとつで流れが変わります`,
    `背すじを少し伸ばすだけでも気分は整います`,
    `今の調子に合わせて動けば大丈夫です`,
    `自分を責めずにいきましょう`,
    `ゆっくりでも続けることが力になります`,
    `今日のペースは今日の正解です`,
    `落ち着いて進めばちゃんと整っていきます`,
    `ひと息入れながらで十分です`,
    `笑顔になれる瞬間をひとつ探してみましょう`,
    `できないことよりできたことに目を向けましょう`,
    `今の自分をそのまま認めてあげましょう`,
    `心配しすぎず目の前の一歩で大丈夫です`,
    `外の空気を少し吸うだけでも気分転換になります`
  ];

  const actions = [
    `薬チェックも忘れずに`,
    `温かい飲み物でひと息ついて`,
    `こまめに座り直して姿勢を楽にして`,
    `窓辺で空を見て気分転換して`,
    `軽くストレッチして`,
    `予定をひとつだけ進めて`,
    `できたことをメモして`,
    `好きな音楽で気持ちを整えて`,
    `朝昼夜のリズムを意識して`,
    `無理のない範囲で体を動かして`
  ];

  const closers = [
    `応援しています✨`,
    `いい流れでいけます🌿`,
    `そのままで十分です🌈`,
    `今日も大丈夫です☀️`,
    `やさしく進めばOKです🍀`,
    `ちゃんと積み重なっています💪`,
    `安心していきましょう😊`,
    `落ち着いていけばうまくいきます✨`,
    `無理せずいきましょう🌸`,
    `いい一日になりますように🌟`
  ];

  const result = [];
  for (const intro of intros) {
    for (const support of supports) {
      for (const action of actions) {
        for (const closer of closers) {
          const message = `${intro}${support}${hobbyText}。${action}。${closer}`
            .replace(/、、/g,'、')
            .replace(/。+/g,'。')
            .replace(/\s+/g,' ')
            .trim();
          result.push(message);
          if (result.length === 5000) return result;
        }
      }
    }
  }
  return result;
}

function showMsg(forceNew=false){
  if(!weatherLinkedMsgs.length){
    weatherLinkedMsgs = generateWeatherLinkedMessages(weatherContext);
  }

  const savedText = load('memberMsgText','');
  if(!forceNew && savedText){
    document.getElementById('memberMsg').innerText = savedText;
    return;
  }

  let usedIndexes = load('memberMsgUsedIndexes',[]);
  if(forceNew && usedIndexes.length >= weatherLinkedMsgs.length){
    usedIndexes = [];
  }

  let index;
  do{
    index = Math.floor(Math.random()*weatherLinkedMsgs.length);
  }while(weatherLinkedMsgs.length > 1 && usedIndexes.includes(index));

  usedIndexes.push(index);
  if(usedIndexes.length > weatherLinkedMsgs.length){
    usedIndexes = [index];
  }

  save('memberMsgUsedIndexes',usedIndexes);
  save('memberMsgLastShownAt',Date.now());
  save('memberMsgText', weatherLinkedMsgs[index]);
  document.getElementById('memberMsg').innerText = weatherLinkedMsgs[index];
}

function scheduleMemberMessages(){
  if(memberMsgTimer) clearInterval(memberMsgTimer);
  memberMsgTimer = setInterval(()=>showMsg(true), MEMBER_MSG_INTERVAL);
}

function refreshWeatherLinkedMessages(){
  weatherLinkedMsgs = generateWeatherLinkedMessages(weatherContext);
  save('memberMessageCount', weatherLinkedMsgs.length);
  showMsg(true);
  scheduleMemberMessages();
}

(function initializeMemberMessage(){
  const lastShownAt = load('memberMsgLastShownAt',0);
  const now = Date.now();
  const savedText = load('memberMsgText','');

  if(!savedText || now - lastShownAt >= MEMBER_MSG_INTERVAL){
    refreshWeatherLinkedMessages();
  }else{
    document.getElementById('memberMsg').innerText = savedText;
    scheduleMemberMessages();
  }
})();

// ===== フォント =====
function changeFont(size){
  document.body.className=size;
  save('font',size);
}
(function(){
  const f=load('font','medium');
  changeFont(f);
})();

// ===== 設定 =====
function toggleSettings(){
  const el=document.getElementById('settingsPanel');
  el.style.display = el.style.display==='block'?'none':'block';
}

function saveSettings(){
  save('name',name.value);
  save('city',city.value);
  save('birthday',birthday.value);
  save('hobby',hobby.value);
  save('anniv',anniv.value);
  alert("保存したよ✨");
  loadWeather();
}

function loadSettings(){
  name.value=load('name','');
  city.value=load('city','Tokyo');
  birthday.value=load('birthday','');
  hobby.value=load('hobby','');
  anniv.value=load('anniv','');
}

// ===== 天気（簡易Open-Meteo） =====
async function loadWeather(){
  const city=load('city','Tokyo');
  try{
    const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}`);
    const g=await geo.json();
    if(!g.results || !g.results.length){
      document.getElementById('weather').innerText="地域が見つかりません";
      weatherContext = { city, tmax:null, tmin:null, rain:null, weatherType:'default' };
      refreshWeatherLinkedMessages();
      return;
    }
    const {latitude,longitude}=g.results[0];

    const w=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max&timezone=Asia%2FTokyo`);
    const d=await w.json();

    const tmax=d.daily.temperature_2m_max[0];
    const tmin=d.daily.temperature_2m_min[0];
    const rain=d.daily.precipitation_probability_max[0];
    const weatherType = detectWeatherType(tmax, rain);

    weatherContext = { city, tmax, tmin, rain, weatherType };

    document.getElementById('weather').innerHTML =
      `🌤 ${city}<br>最高:${tmax}℃ 最低:${tmin}℃ 降水:${rain}%`;

    refreshWeatherLinkedMessages();
  }catch(e){
    document.getElementById('weather').innerText="天気取得失敗";
    weatherContext = { city, tmax:null, tmin:null, rain:null, weatherType:'default' };
    refreshWeatherLinkedMessages();
  }
}

loadSettings();
loadWeather();
</script>

</body>
</html>
