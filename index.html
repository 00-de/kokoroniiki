<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<meta
name="viewport"
content="
width=device-width,
initial-scale=1.0,
viewport-fit=cover,
user-scalable=no
">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffd9ec">

<title>DayDreamプラス Life</title>

<style>

:root{
  --bg1:#fff5fb;
  --bg2:#eef7ff;
  --card:#ffffff;
  --text:#444;
  --accent:#ff7fb0;
  --shadow:0 8px 24px rgba(0,0,0,0.08);

  --fontSize:22px;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  margin:0;
  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Hiragino Sans",
  sans-serif;

  background:
  linear-gradient(
  180deg,
  var(--bg1),
  var(--bg2)
  );

  color:var(--text);

  min-height:100vh;

  padding:
  env(safe-area-inset-top)
  16px
  calc(100px + env(safe-area-inset-bottom))
  16px;

  font-size:var(--fontSize);

  transition:0.3s;
}

.card{
  background:var(--card);
  border-radius:28px;
  padding:20px;
  margin-bottom:18px;
  box-shadow:var(--shadow);
}

.title{
  font-size:1.4em;
  font-weight:bold;
  text-align:center;
  margin-bottom:10px;
}

.bigDate{
  font-size:1.2em;
  font-weight:bold;
  text-align:center;
  line-height:1.7;
}

.time{
  font-size:2.2em;
  text-align:center;
  font-weight:bold;
  color:var(--accent);
}

.weather{
  text-align:center;
  line-height:1.8;
}

.weatherIcon{
  font-size:2.2em;
}

.btn{
  width:100%;
  border:none;
  border-radius:18px;
  padding:16px;
  margin-top:10px;
  font-size:1em;
  background:#ffe1ef;
  color:#444;
}

.btn:active{
  transform:scale(0.98);
}

.check{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

input[type="checkbox"]{
  width:28px;
  height:28px;
}

.moodGrid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.moodBtn{
  border:none;
  border-radius:20px;
  padding:18px;
  font-size:1em;
  background:#eef4ff;
}

.message{
  line-height:1.8;
  font-weight:bold;
  color:#ff6699;
}

.member{
  margin-top:14px;
  padding:14px;
  border-radius:18px;
  background:#fff7fb;
}

.settings{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:var(--accent);
  color:white;
  font-size:28px;
  box-shadow:var(--shadow);
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:100;
}

.modalContent{
  width:92%;
  max-height:85vh;
  overflow:auto;
  background:white;
  border-radius:28px;
  padding:20px;
}

input,select{
  width:100%;
  padding:16px;
  margin-top:10px;
  margin-bottom:16px;
  border-radius:16px;
  border:1px solid #ddd;
  font-size:1em;
}

.fontButtons{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}

.calendarHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:12px;
}

.calendarTitle{
  font-weight:bold;
  text-align:center;
  flex:1;
}

.calendarWeek,
.calendarGrid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:8px;
}

.calendarWeek div{
  text-align:center;
  font-weight:bold;
  color:#888;
  padding:8px 0;
}

.calendarCell{
  background:#fff7fb;
  border-radius:16px;
  min-height:54px;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.04);
}

.calendarCell.empty{
  background:transparent;
  box-shadow:none;
}

.calendarCell.today{
  background:#ff7fb0;
  color:white;
  font-weight:bold;
}

.miniBtn{
  border:none;
  border-radius:14px;
  padding:10px 14px;
  background:#ffe1ef;
  color:#444;
  font-size:1em;
}

.footerSpace{
  height:60px;
}

</style>
</head>
<body>

<div class="card">
  <div class="title">🌸 DayDreamプラス Life</div>

  <div class="bigDate" id="date"></div>

  <div class="time" id="time"></div>
</div>

<div class="card weather">

  <div class="weatherIcon">☀️</div>

  <div id="weatherText">
    静岡県 ○○市<br>
    晴れ<br>
    最高24℃ / 最低15℃<br>
    降水確率20%
  </div>

</div>

<div class="card">

  <div class="title">📅 カレンダー</div>

  <div class="calendarHeader">
    <button class="miniBtn" onclick="changeMonth(-1)">←</button>
    <div class="calendarTitle" id="calendarTitle"></div>
    <button class="miniBtn" onclick="changeMonth(1)">→</button>
  </div>

  <div class="calendarWeek">
    <div>日</div>
    <div>月</div>
    <div>火</div>
    <div>水</div>
    <div>木</div>
    <div>金</div>
    <div>土</div>
  </div>

  <div class="calendarGrid" id="calendar"></div>

</div>

<div class="card">

  <div class="title">💊 薬チェック</div>

  <label class="check">
    <input type="checkbox" id="morning">
    朝の薬
  </label>

  <label class="check">
    <input type="checkbox" id="noon">
    昼の薬
  </label>

  <label class="check">
    <input type="checkbox" id="night">
    夜の薬
  </label>

</div>

<div class="card">

  <div class="title">😊 今日の気分</div>

  <div class="moodGrid">

    <button class="moodBtn" onclick="setMood('😊 元気')">
      😊 元気
    </button>

    <button class="moodBtn" onclick="setMood('🙂 普通')">
      🙂 普通
    </button>

    <button class="moodBtn" onclick="setMood('😢 疲れた')">
      😢 疲れた
    </button>

    <button class="moodBtn" onclick="setMood('😴 眠い')">
      😴 眠い
    </button>

  </div>

</div>

<div class="card">

  <div class="title">🌈 DayDreamメッセージ</div>

  <div class="member">
    <div class="message" id="messageArea"></div>
  </div>

</div>

<div class="card">

  <div class="title">🎂 記念日</div>

  <div id="anniversaryText">
    記念日を設定してください✨
  </div>

</div>

<button class="settings" onclick="openSettings()">
⚙️
</button>

<div class="modal" id="modal">

  <div class="modalContent">

    <div class="title">⚙️ 設定</div>

    <input type="text" id="name" placeholder="名前">

    <input type="text" id="nickname" placeholder="あだ名">

    <input type="text" id="city" placeholder="住んでいる地域">

    <input type="date" id="birthday">

    <input type="text" id="hobby" placeholder="趣味">

    <input type="text" id="anniversary" placeholder="記念日">

    <div class="title">🔠文字サイズ</div>

    <div class="fontButtons">

      <button class="btn" onclick="setFont(18)">小</button>

      <button class="btn" onclick="setFont(22)">中</button>

      <button class="btn" onclick="setFont(28)">大</button>

      <button class="btn" onclick="setFont(34)">最大</button>

    </div>

    <button class="btn" onclick="saveSettings()">
      保存
    </button>

    <button class="btn" onclick="closeSettings()">
      閉じる
    </button>

  </div>

</div>

<div class="footerSpace"></div>

<script>

function updateClock(){

  const now = new Date();

  const week = [
    "日","月","火","水","木","金","土"
  ];

  const reiwa = now.getFullYear() - 2018;

  const h = now.getHours();

  const ampm = h >= 12 ? "午後" : "午前";

  const hh = String(h % 12 || 12).padStart(2,"0");

  const mm = String(now.getMinutes()).padStart(2,"0");

  document.getElementById("date").innerHTML =
  `
  令和${reiwa}年
  ${now.getMonth()+1}月
  ${now.getDate()}日
  (${week[now.getDay()]}曜日)
  `;

  document.getElementById("time").innerHTML =
  `${ampm} ${hh}:${mm}`;
}

setInterval(updateClock,1000);
updateClock();

const messages = [

"悠真：今日はゆっくりでも大丈夫☺️",

"結衣：頑張ってるのちゃんと知ってるよ✨",

"蓮：焦らなくて大丈夫！",

"葵：笑顔でいこうね🌸",

"大地：元気出していこう！",

"美琴：あなたは一人じゃないよ🌈"

];

function randomMessage(){

  const msg =
  messages[
    Math.floor(Math.random()*messages.length)
  ];

  document.getElementById("messageArea").innerHTML =
  msg;
}

randomMessage();

function setMood(mood){

  localStorage.setItem("mood",mood);

  alert("保存しました✨\n" + mood);

  randomMessage();
}

function saveChecks(){

  localStorage.setItem(
    "morning",
    document.getElementById("morning").checked
  );

  localStorage.setItem(
    "noon",
    document.getElementById("noon").checked
  );

  localStorage.setItem(
    "night",
    document.getElementById("night").checked
  );
}

["morning","noon","night"].forEach(id=>{

  document
  .getElementById(id)
  .addEventListener("change",saveChecks);

});

function loadChecks(){

  ["morning","noon","night"].forEach(id=>{

    document.getElementById(id).checked =
    localStorage.getItem(id)==="true";

  });

}

loadChecks();

function openSettings(){
  document.getElementById("modal").style.display="flex";
}

function closeSettings(){
  document.getElementById("modal").style.display="none";
}

function saveSettings(){

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversary"
  ];

  ids.forEach(id=>{

    localStorage.setItem(
      id,
      document.getElementById(id).value
    );

  });

  document.getElementById("anniversaryText").innerHTML =
  "🎉 " +
  (
    document.getElementById("anniversary").value
    || "記念日を設定してください✨"
  );

  alert("保存しました✨");

  closeSettings();
}

function loadSettings(){

  const ids = [
    "name",
    "nickname",
    "city",
    "birthday",
    "hobby",
    "anniversary"
  ];

  ids.forEach(id=>{

    document.getElementById(id).value =
    localStorage.getItem(id)||"";

  });

  document.getElementById("anniversaryText").innerHTML =
  "🎉 " +
  (
    localStorage.getItem("anniversary")
    || "記念日を設定してください✨"
  );

}

loadSettings();

function setFont(size){

  document.documentElement.style
  .setProperty("--fontSize",size+"px");

  localStorage.setItem("fontSize",size);
}

const savedFont =
localStorage.getItem("fontSize");

if(savedFont){

  setFont(savedFont);

}

let calendarDate = new Date(
  new Date().getFullYear(),
  new Date().getMonth(),
  1
);

function renderCalendar(){

  const year = calendarDate.getFullYear();
  const month = calendarDate.getMonth();

  document.getElementById("calendarTitle").innerHTML =
  `${year}年 ${month + 1}月`;

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  const today = new Date();

  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  for(let i = 0; i < firstDay; i++){
    calendar.innerHTML += `<div class="calendarCell empty"></div>`;
  }

  for(let day = 1; day <= lastDate; day++){

    const isToday =
      today.getFullYear() === year &&
      today.getMonth() === month &&
      today.getDate() === day;

    calendar.innerHTML += `
      <div class="calendarCell ${isToday ? 'today' : ''}">
        ${day}
      </div>
    `;
  }
}

function changeMonth(step){
  calendarDate.setMonth(calendarDate.getMonth() + step);
  renderCalendar();
}

renderCalendar();

</script>

</body>
</html>
